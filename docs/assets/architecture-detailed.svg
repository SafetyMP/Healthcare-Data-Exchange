<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Healthcare Exchange component architecture</title>
  <desc id="desc">PoC services, ports, OPAL policy and consent sync, and regional FHIR cells.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .box { font-family: system-ui, Segoe UI, sans-serif; }
      .title { fill: #f8fafc; font-size: 22px; font-weight: 700; }
      .sub { fill: #94a3b8; font-size: 13px; }
      .svc { fill: #fff; font-size: 12px; font-weight: 600; }
      .port { fill: #cbd5e1; font-size: 10px; }
      .lane { fill: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="16"/>
  <text x="600" y="40" text-anchor="middle" class="box title">CHEX PoC component architecture</text>
  <text x="600" y="64" text-anchor="middle" class="box sub">Docker compose stack | synthetic FHIR only</text>

  <!-- Client -->
  <g filter="url(#shadow)">
    <rect x="500" y="88" width="200" height="48" rx="10" fill="#334155"/>
    <text x="600" y="118" text-anchor="middle" class="box svc">Client / demo.sh</text>
  </g>
  <line x1="600" y1="136" x2="600" y2="168" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Global plane label -->
  <text x="80" y="190" class="box lane">GLOBAL PLANE (no PHI)</text>
  <rect x="72" y="198" width="1056" height="250" rx="14" fill="#312e81" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>

  <!-- Gateway -->
  <g filter="url(#shadow)">
    <rect x="500" y="220" width="200" height="56" rx="10" fill="#7c3aed"/>
    <text x="600" y="246" text-anchor="middle" class="box svc">Gateway (Go PEP)</text>
    <text x="600" y="264" text-anchor="middle" class="box port">:8081</text>
  </g>

  <!-- Row of services -->
  <g filter="url(#shadow)">
    <rect x="120" y="310" width="170" height="56" rx="10" fill="#0ea5e9"/>
    <text x="205" y="336" text-anchor="middle" class="box svc">identity-broker</text>
    <text x="205" y="354" text-anchor="middle" class="box port">:8085 ITI-78</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="310" width="170" height="56" rx="10" fill="#22c55e"/>
    <text x="425" y="336" text-anchor="middle" class="box svc">OPA (opal-client)</text>
    <text x="425" y="354" text-anchor="middle" class="box port">:8181 PDP</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="310" width="170" height="56" rx="10" fill="#a855f7"/>
    <text x="645" y="336" text-anchor="middle" class="box svc">OPAL server</text>
    <text x="645" y="354" text-anchor="middle" class="box port">:7002</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="780" y="310" width="170" height="56" rx="10" fill="#ec4899"/>
    <text x="865" y="336" text-anchor="middle" class="box svc">consent-service</text>
    <text x="865" y="354" text-anchor="middle" class="box port">:8084 data src</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1000" y="310" width="120" height="56" rx="10" fill="#f59e0b"/>
    <text x="1060" y="336" text-anchor="middle" class="box svc">ai-gov</text>
    <text x="1060" y="354" text-anchor="middle" class="box port">:8082</text>
  </g>

  <!-- Policy mirror -->
  <g filter="url(#shadow)">
    <rect x="340" y="390" width="220" height="48" rx="10" fill="#475569"/>
    <text x="450" y="420" text-anchor="middle" class="box svc">healthcare-policy (git)</text>
  </g>

  <!-- Arrows global -->
  <line x1="600" y1="276" x2="425" y2="308" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="276" x2="205" y2="308" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="310" x2="645" y2="276" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="865" y1="310" x2="700" y2="276" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="390" x2="580" y2="366" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="336" x2="510" y2="336" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Regional cells -->
  <text x="80" y="500" class="box lane">REGIONAL CELLS (PHI in-region)</text>
  <g filter="url(#shadow)">
    <rect x="120" y="518" width="420" height="120" rx="14" fill="#0369a1"/>
    <text x="330" y="552" text-anchor="middle" class="box svc" font-size="16">EU jurisdiction cell</text>
    <text x="330" y="578" text-anchor="middle" class="box port">HAPI FHIR R4 :8080 | GDPR / EHDS rules</text>
    <text x="330" y="600" text-anchor="middle" class="box port">Synthetic patients under fhir/samples/eu/</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="518" width="420" height="120" rx="14" fill="#c2410c"/>
    <text x="870" y="552" text-anchor="middle" class="box svc" font-size="16">US jurisdiction cell</text>
    <text x="870" y="578" text-anchor="middle" class="box port">HAPI FHIR R4 :8083 | TEFCA + SSRAA stub</text>
    <text x="870" y="600" text-anchor="middle" class="box port">Synthetic patients under fhir/samples/us/</text>
  </g>
  <line x1="500" y1="276" x2="330" y2="516" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="276" x2="870" y2="516" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="600" y="690" text-anchor="middle" class="box sub">See docs/architecture/overview.md and ADRs 0001-0011</text>
</svg>
