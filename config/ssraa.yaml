# SSRAA application associations — US cell only (ADR 0009)
# Production: UDAP/SSRAA token exchange; PoC uses shared-secret bearer tokens.
required: true

associations:
  tefca-demo-client:
    secret: demo-ssraa-secret
    jurisdiction: us-home
    scopes:
      - patient.read
  us-clinician-client:
    secret: demo-us-clinician-secret
    jurisdiction: us-clinician
    scopes:
      - patient.read
    cross_bloc_permitted: true
