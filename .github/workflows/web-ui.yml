name: web-ui
on:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
  pull_request:
    paths:
      - 'web/**'

permissions:
  contents: read

concurrency:
  group: web-ui-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933aa9956b3b139c928fcef702ebdaa685338a # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify (typecheck, build, smoke + axe)
        run: npm run verify
