name: harness-check
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Harness contract + verify
        run: |
          HARNESS="${CURSOR_HARNESS_BIN:-$HOME/.cursor/bin/harness}"
          if [[ -x "$HARNESS" ]]; then
            "$HARNESS" check --contract --legacy-ok || "$HARNESS" check --contract
          elif [[ -x ./scripts/verify.sh ]]; then
            ./scripts/verify.sh
          else
            echo "No harness CLI or scripts/verify.sh" >&2
            exit 1
          fi
