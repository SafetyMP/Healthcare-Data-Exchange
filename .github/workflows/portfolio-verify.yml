name: portfolio-verify
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: portfolio-verify-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          repository: SafetyMP/healthcare-policy
          path: healthcare-policy

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.22"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install verify dependencies
        run: pip install pyyaml

      - name: Portfolio verify (canonical + mirror cross-check)
        env:
          CHEX_PORTFOLIO_MIRROR_PATH: healthcare-policy
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh 2>/dev/null || true
          ./scripts/verify.sh
          ./scripts/check-portfolio-cross-repo.sh
