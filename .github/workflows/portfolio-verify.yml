name: portfolio-verify
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: portfolio-verify-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: SafetyMP/healthcare-policy
          path: healthcare-policy

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install verify dependencies
        run: pip install pyyaml

      - name: Portfolio verify (canonical + mirror cross-check)
        env:
          CHEX_PORTFOLIO_MIRROR_PATH: healthcare-policy
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh 2>/dev/null || true
          ./scripts/verify.sh
          ./scripts/check-portfolio-cross-repo.sh
